<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>课程评价社区</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:60px}
/* 通用 */
.page{padding:12px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;text-align:center}
.btn-primary{background:#4CAF50;color:#fff}
.btn-outline{background:#fff;color:#4CAF50;border:1px solid #4CAF50}
.input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:12px;outline:none}
.input:focus{border-color:#4CAF50}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tag{display:inline-block;background:#E8F5E9;color:#4CAF50;padding:2px 10px;border-radius:12px;font-size:12px;margin-right:6px}
/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:#fff;border-top:1px solid #eee;z-index:99}
.bottom-nav .nav-item{flex:1;text-align:center;padding:8px 0;font-size:12px;color:#999;cursor:pointer}
.bottom-nav .nav-item.active{color:#4CAF50}
.bottom-nav .nav-item .icon{font-size:20px;display:block}
/* 搜索 */
.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-bar input{flex:1}
/* 分类chips */
.chips{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid #ddd;background:#fff}
.chip.active{background:#4CAF50;color:#fff;border-color:#4CAF50}
/* 课程卡片 */
.course-card{display:flex;justify-content:space-between;align-items:center}
.course-info h3{font-size:16px;margin-bottom:4px}
.course-info p{color:#666;font-size:13px}
.course-score{text-align:center}
.course-score .score{font-size:24px;font-weight:bold;color:#4CAF50}
.course-score .count{font-size:12px;color:#999}
/* 星级 */
.stars{color:#FFD700;font-size:14px;margin-top:4px}
/* 详情页 */
.detail-header{text-align:center;padding:20px 0}
.detail-header h2{font-size:22px}
.detail-header .big-score{font-size:42px;font-weight:bold;color:#4CAF50}
.back-btn{position:absolute;left:12px;top:12px;background:none;border:none;font-size:24px;cursor:pointer;z-index:10}
/* 雷达图 */
.radar-wrap{display:flex;justify-content:center;margin:16px 0}
/* 评价项 */
.review-item{border-bottom:1px solid #f0f0f0;padding:12px 0}
.review-item:last-child{border:none}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.review-user{font-weight:bold}
.review-score{color:#4CAF50;font-weight:bold}
.review-comment{font-size:15px;line-height:1.5;margin:6px 0}
.review-tags{margin:6px 0}
.review-footer{display:flex;justify-content:space-between;align-items:center;color:#999;font-size:12px}
.vote-btns button{background:none;border:none;cursor:pointer;font-size:14px;margin-left:8px;color:#666}
.vote-btns button:hover{color:#4CAF50}
/* 视频 */
.video-player{width:100%;border-radius:8px;margin:8px 0;max-height:200px}
/* 打分滑块 */
.score-row{margin-bottom:14px}
.score-row label{display:flex;justify-content:space-between;font-size:14px;font-weight:bold;margin-bottom:4px}
.score-row input[type=range]{width:100%;accent-color:#4CAF50}
/* 标签选择 */
.tag-select{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.tag-select .tag-btn{padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px}
.tag-select .tag-btn.selected{background:#4CAF50;color:#fff;border-color:#4CAF50}
/* 排行 */
.rank-item{display:flex;align-items:center;gap:12px}
.rank-num{font-size:22px;font-weight:bold;width:36px;text-align:center}
.rank-num.gold{color:#FFD700}
.rank-num.silver{color:#C0C0C0}
.rank-num.bronze{color:#CD7F32}
.rank-info{flex:1}
.rank-info h4{font-size:15px}
.rank-info p{font-size:12px;color:#999}
/* Tab */
.tabs{display:flex;background:#4CAF50;border-radius:8px;margin-bottom:12px;overflow:hidden}
.tabs .tab{flex:1;text-align:center;padding:10px;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px}
.tabs .tab.active{color:#fff;background:rgba(255,255,255,.15)}
/* 个人中心 */
.profile-page{text-align:center;padding-top:60px}
.avatar{font-size:64px}
.profile-page h2{margin:16px 0 40px}
/* 登录页 */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px}
.auth-page h1{color:#4CAF50;margin-bottom:40px;font-size:28px}
.auth-page .link{color:#4CAF50;margin-top:16px;cursor:pointer;font-size:14px}
/* 文件上传 */
.upload-area{border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#999;margin:8px 0}
.upload-area:hover{border-color:#4CAF50;color:#4CAF50}
textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;resize:vertical;min-height:100px;outline:none;font-family:inherit}
textarea:focus{border-color:#4CAF50}
</style>
</head>
<body>
<div id="app">
  <!-- 登录页 -->
  <div v-if="page==='login'" class="auth-page">
    <h1>📚 课程评价社区</h1>
    <input class="input" v-model="loginForm.username" placeholder="用户名">
    <input class="input" v-model="loginForm.password" type="password" placeholder="密码">
    <button class="btn btn-primary" @click="doLogin">登录</button>
    <span class="link" @click="page='register'">没有账号？立即注册</span>
  </div>

  <!-- 注册页 -->
  <div v-if="page==='register'" class="auth-page">
    <h1>注册新账号</h1>
    <input class="input" v-model="regForm.username" placeholder="用户名">
    <input class="input" v-model="regForm.password" type="password" placeholder="密码">
    <input class="input" v-model="regForm.nickname" placeholder="昵称">
    <button class="btn btn-primary" @click="doRegister">注册</button>
    <span class="link" @click="page='login'">已有账号？去登录</span>
  </div>

  <!-- 主页面 -->
  <template v-if="['courses','rank','profile'].includes(page)">
    <!-- 课程列表 -->
    <div v-if="page==='courses'" class="page">
      <div class="search-bar">
        <input class="input" v-model="keyword" placeholder="🔍 搜索课程/老师" style="margin-bottom:0">
      </div>
      <div class="chips">
        <span class="chip" :class="{active:selectedCat===c}" v-for="c in categories" @click="selectedCat=c">{{c}}</span>
      </div>
      <div class="card course-card" v-for="co in filteredCourses" :key="co.id" @click="openCourse(co.id)">
        <div class="course-info">
          <h3>{{co.name}}</h3>
          <p>{{co.teacher}}</p>
          <span class="tag">{{co.category}}</span>
          <div class="stars">{{getStars(co.avgScore)}}</div>
        </div>
        <div class="course-score">
          <div class="score">{{co.avgScore.toFixed(1)}}</div>
          <div class="count">{{co.reviewCount}}条评价</div>
        </div>
      </div>
      <div v-if="filteredCourses.length===0" style="text-align:center;color:#999;padding:40px">暂无课程</div>
    </div>

    <!-- 排行榜 -->
    <div v-if="page==='rank'" class="page">
      <div class="tabs">
        <div class="tab" :class="{active:rankTab===0}" @click="rankTab=0">综合评分</div>
        <div class="tab" :class="{active:rankTab===1}" @click="rankTab=1">本周热门</div>
      </div>
      <div class="card rank-item" v-for="(co,i) in rankedCourses" :key="co.id" @click="openCourse(co.id)">
        <div class="rank-num" :class="{gold:i===0,silver:i===1,bronze:i===2}">{{i+1}}</div>
        <div class="rank-info">
          <h4>{{co.name}}</h4>
          <p>{{co.teacher}} · {{co.reviewCount}}条评价</p>
        </div>
        <div style="font-size:20px;font-weight:bold;color:#4CAF50">{{co.avgScore.toFixed(1)}}</div>
      </div>
    </div>

    <!-- 个人中心 -->
    <div v-if="page==='profile'" class="page profile-page">
      <div class="avatar">👤</div>
      <h2>{{currentUser.nickname}}</h2>
      <button class="btn btn-outline" @click="doLogout">退出登录</button>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item" :class="{active:page==='courses'}" @click="page='courses'">
        <span class="icon">📚</span>课程
      </div>
      <div class="nav-item" :class="{active:page==='rank'}" @click="page='rank'">
        <span class="icon">🏆</span>排行榜
      </div>
      <div class="nav-item" :class="{active:page==='profile'}" @click="page='profile'">
        <span class="icon">👤</span>我的
      </div>
    </div>
  </template>

  <!-- 课程详情页 -->
  <div v-if="page==='detail'" class="page" style="position:relative">
    <button class="back-btn" @click="page='courses'">←</button>
    <div class="detail-header">
      <h2>{{detailCourse.name}}</h2>
      <p style="color:#666">{{detailCourse.teacher}}</p>
      <div class="big-score">{{detailCourse.avgScore.toFixed(1)}}</div>
      <div style="color:#999">{{detailCourse.reviewCount}}条评价</div>
    </div>

    <!-- 雷达图 -->
    <div class="radar-wrap">
      <canvas ref="radarCanvas" width="280" height="280"></canvas>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary" style="width:auto;padding:8px 20px" @click="page='write'">✏️ 写评价</button>
    </div>

    <h3 style="margin-bottom:10px">全部评价</h3>
    <div class="card" v-for="r in courseReviews" :key="r.id">
      <div class="review-header">
        <span class="review-user">{{r.username}}</span>
        <span class="review-score">{{r.overall.toFixed(1)}}分</span>
      </div>
      <div class="review-comment">{{r.comment}}</div>
      <div class="review-tags" v-if="r.tags"><span class="tag" v-for="t in r.tags.split(' · ')">{{t}}</span></div>
      <video v-if="r.videoUrl" class="video-player" :src="r.videoUrl" controls></video>
      <div class="review-footer">
        <span>{{formatDate(r.timestamp)}}</span>
        <span class="vote-btns">
          <button @click="likeReview(r.id)">👍 {{r.likes}}</button>
          <button @click="dislikeReview(r.id)">👎 {{r.dislikes}}</button>
        </span>
      </div>
    </div>
    <div v-if="courseReviews.length===0" style="text-align:center;color:#999;padding:30px">暂无评价，快来写第一条吧！</div>
  </div>

  <!-- 写评价页 -->
  <div v-if="page==='write'" class="page" style="position:relative">
    <button class="back-btn" @click="page='detail'">←</button>
    <h2 style="text-align:center;margin-bottom:20px;padding-top:8px">写评价</h2>

    <div class="score-row" v-for="d in dimensions" :key="d.key">
      <label><span>{{d.label}}</span><span>{{writeForm[d.key].toFixed(1)}}</span></label>
      <input type="range" min="0" max="5" step="0.1" v-model.number="writeForm[d.key]">
    </div>

    <h4 style="margin-bottom:8px">选择标签</h4>
    <div class="tag-select">
      <span class="tag-btn" v-for="t in allTags" :class="{selected:writeForm.tags.includes(t)}" @click="toggleTag(t)">{{t}}</span>
    </div>

    <textarea v-model="writeForm.comment" placeholder="写下你的评价..."></textarea>

    <div class="upload-area" @click="$refs.videoInput.click()">
      🎬 点击选择课堂视频片段
      <input ref="videoInput" type="file" accept="video/*" style="display:none" @change="onVideoSelect">
    </div>
    <video v-if="writeForm.videoUrl" class="video-player" :src="writeForm.videoUrl" controls></video>

    <button class="btn btn-primary" style="margin-top:16px" @click="submitReview">发布评价</button>
  </div>
</div>

<script>
const {createApp,ref,computed,watch,nextTick,onMounted} = Vue;

createApp({
  setup(){
    // ===== 数据层 =====
    const STORAGE_KEY = 'courseReviewApp';
    function loadData(){
      const d = localStorage.getItem(STORAGE_KEY);
      if(d) return JSON.parse(d);
      const init = {
        users:[],
        courses:[
          {id:1,name:'高等数学',teacher:'张教授',category:'理学',viewCount:120},
          {id:2,name:'数据结构',teacher:'李教授',category:'计算机',viewCount:200},
          {id:3,name:'操作系统',teacher:'王教授',category:'计算机',viewCount:85},
          {id:4,name:'大学英语',teacher:'刘教授',category:'外语',viewCount:150},
          {id:5,name:'线性代数',teacher:'陈教授',category:'理学',viewCount:90},
          {id:6,name:'计算机网络',teacher:'赵教授',category:'计算机',viewCount:175},
          {id:7,name:'移动互联网技术',teacher:'周教授',category:'计算机',viewCount:210},
          {id:8,name:'数据库原理',teacher:'吴教授',category:'计算机',viewCount:130},
          {id:9,name:'软件工程',teacher:'郑教授',category:'计算机',viewCount:95},
          {id:10,name:'概率论',teacher:'孙教授',category:'理学',viewCount:70}
        ],
        reviews:[],
        nextUserId:1,nextReviewId:1
      };
      localStorage.setItem(STORAGE_KEY,JSON.stringify(init));
      return init;
    }
    const db = ref(loadData());
    function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(db.value)); }

    // ===== 状态 =====
    const page = ref('login');
    const currentUser = ref(JSON.parse(localStorage.getItem('crUser')||'null'));
    if(currentUser.value) page.value = 'courses';

    // 登录
    const loginForm = ref({username:'',password:''});
    const regForm = ref({username:'',password:'',nickname:''});

    function doLogin(){
      const u = db.value.users.find(u=>u.username===loginForm.value.username && u.password===loginForm.value.password);
      if(!u) return alert('用户名或密码错误');
      currentUser.value = u;
      localStorage.setItem('crUser',JSON.stringify(u));
      page.value = 'courses';
    }
    function doRegister(){
      const {username,password,nickname} = regForm.value;
      if(!username||!password||!nickname) return alert('请填写完整信息');
      if(db.value.users.find(u=>u.username===username)) return alert('用户名已存在');
      const u = {id:db.value.nextUserId++,username,password,nickname};
      db.value.users.push(u);
      save();
      alert('注册成功，请登录');
      page.value = 'login';
    }
    function doLogout(){
      currentUser.value = null;
      localStorage.removeItem('crUser');
      page.value = 'login';
    }

    // ===== 课程列表 =====
    const keyword = ref('');
    const selectedCat = ref('全部');
    const categories = ['全部','计算机','理学','外语'];

    function getCourseScores(courseId){
      const revs = db.value.reviews.filter(r=>r.courseId===courseId);
      if(!revs.length) return {avgScore:0,avgTeaching:0,avgContent:0,avgEasy:0,avgGrading:0,avgGain:0,reviewCount:0};
      const avg = k => revs.reduce((s,r)=>s+r[k],0)/revs.length;
      return {avgScore:(avg('teaching')+avg('content')+avg('easy')+avg('grading')+avg('gain'))/5,
        avgTeaching:avg('teaching'),avgContent:avg('content'),avgEasy:avg('easy'),
        avgGrading:avg('grading'),avgGain:avg('gain'),reviewCount:revs.length};
    }

    const coursesWithScores = computed(()=>
      db.value.courses.map(c=>({...c,...getCourseScores(c.id)}))
    );

    const filteredCourses = computed(()=>{
      let list = coursesWithScores.value;
      if(selectedCat.value!=='全部') list = list.filter(c=>c.category===selectedCat.value);
      if(keyword.value){
        const kw = keyword.value.toLowerCase();
        list = list.filter(c=>c.name.toLowerCase().includes(kw)||c.teacher.toLowerCase().includes(kw));
      }
      return list;
    });

    function getStars(score){
      const full = Math.floor(score);
      const half = score - full >= 0.5 ? 1 : 0;
      return '★'.repeat(full) + (half?'☆':'') + '☆'.repeat(5-full-half);
    }

    // ===== 课程详情 =====
    const detailCourseId = ref(null);
    const detailCourse = computed(()=>coursesWithScores.value.find(c=>c.id===detailCourseId.value)||{name:'',teacher:'',avgScore:0,reviewCount:0});
    const courseReviews = computed(()=>{
      return db.value.reviews.filter(r=>r.courseId===detailCourseId.value)
        .map(r=>({...r,overall:(r.teaching+r.content+r.easy+r.grading+r.gain)/5,
          username: (db.value.users.find(u=>u.id===r.userId)||{}).nickname||'匿名'}))
        .sort((a,b)=>b.likes-a.likes||b.timestamp-a.timestamp);
    });

    const radarCanvas = ref(null);

    function openCourse(id){
      detailCourseId.value = id;
      // 增加浏览量
      const c = db.value.courses.find(c=>c.id===id);
      if(c) c.viewCount++;
      save();
      page.value = 'detail';
      nextTick(()=>drawRadar());
    }

    function drawRadar(){
      const canvas = radarCanvas.value;
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      const cx=140,cy=140,radius=100;
      const labels=['教学','内容','轻松','给分','收获'];
      const co = detailCourse.value;
      const vals = [co.avgTeaching,co.avgContent,co.avgEasy,co.avgGrading,co.avgGain];
      const step = Math.PI*2/5;
      const start = -Math.PI/2;

      ctx.clearRect(0,0,280,280);

      // 网格
      for(let layer=1;layer<=5;layer++){
        ctx.beginPath();
        const r = radius*layer/5;
        for(let i=0;i<5;i++){
          const a=start+i*step;
          const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.stroke();
      }
      // 轴线
      for(let i=0;i<5;i++){
        const a=start+i*step;
        ctx.beginPath();ctx.moveTo(cx,cy);
        ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));
        ctx.strokeStyle='#ddd';ctx.stroke();
      }
      // 数据
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=start+i*step;
        const r=radius*vals[i]/5;
        const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fillStyle='rgba(76,175,80,0.3)';ctx.fill();
      ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;ctx.stroke();
      // 标签
      ctx.fillStyle='#333';ctx.font='14px sans-serif';ctx.textAlign='center';
      for(let i=0;i<5;i++){
        const a=start+i*step;
        const lx=cx+(radius+20)*Math.cos(a),ly=cy+(radius+20)*Math.sin(a)+5;
        ctx.fillText(labels[i],lx,ly);
      }
    }

    function likeReview(id){
      const r = db.value.reviews.find(r=>r.id===id);
      if(r){r.likes++;save();}
    }
    function dislikeReview(id){
      const r = db.value.reviews.find(r=>r.id===id);
      if(r){r.dislikes++;save();}
    }

    // ===== 写评价 =====
    const dimensions = [
      {key:'teaching',label:'教学质量'},
      {key:'content',label:'课程内容'},
      {key:'easy',label:'轻松程度'},
      {key:'grading',label:'给分好坏'},
      {key:'gain',label:'收获程度'}
    ];
    const allTags = ['给分高','有趣','干货多','作业少','点名少','考试简单','老师好','实用'];
    const writeForm = ref({teaching:2.5,content:2.5,easy:2.5,grading:2.5,gain:2.5,comment:'',tags:[],videoUrl:''});
    const videoInput = ref(null);

    function toggleTag(t){
      const idx = writeForm.value.tags.indexOf(t);
      idx===-1 ? writeForm.value.tags.push(t) : writeForm.value.tags.splice(idx,1);
    }

    function onVideoSelect(e){
      const file = e.target.files[0];
      if(file) writeForm.value.videoUrl = URL.createObjectURL(file);
    }

    function submitReview(){
      if(!writeForm.value.comment.trim()) return alert('请输入评价内容');
      const r = {
        id: db.value.nextReviewId++,
        courseId: detailCourseId.value,
        userId: currentUser.value.id,
        teaching: writeForm.value.teaching,
        content: writeForm.value.content,
        easy: writeForm.value.easy,
        grading: writeForm.value.grading,
        gain: writeForm.value.gain,
        comment: writeForm.value.comment,
        tags: writeForm.value.tags.join(' · '),
        videoUrl: '', // 视频blob URL不能持久化，仅演示
        likes:0,dislikes:0,
        timestamp: Date.now()
      };
      db.value.reviews.push(r);
      save();
      alert('评价发布成功！');
      writeForm.value = {teaching:2.5,content:2.5,easy:2.5,grading:2.5,gain:2.5,comment:'',tags:[],videoUrl:''};
      page.value = 'detail';
      nextTick(()=>drawRadar());
    }

    // ===== 排行榜 =====
    const rankTab = ref(0);
    const rankedCourses = computed(()=>{
      let list = [...coursesWithScores.value];
      if(rankTab.value===0) list.sort((a,b)=>b.avgScore-a.avgScore);
      else list.sort((a,b)=>(b.reviewCount*2+b.viewCount)-(a.reviewCount*2+a.viewCount));
      return list.slice(0,10);
    });

    function formatDate(ts){
      const d=new Date(ts);
      return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
    }

    return {
      page,currentUser,loginForm,regForm,doLogin,doRegister,doLogout,
      keyword,selectedCat,categories,filteredCourses,getStars,
      detailCourse,courseReviews,radarCanvas,openCourse,likeReview,dislikeReview,
      dimensions,allTags,writeForm,videoInput,toggleTag,onVideoSelect,submitReview,
      rankTab,rankedCourses,formatDate
    };
  }
}).mount('#app');
</script>
</body>
</html>
